<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog Preview Card | Практична №3</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@500;800&display=swap" rel="stylesheet">
</head>
<body>

    <main class="page-wrapper">
        <article class="card">
            <img class="card__image"
                 src="assets/images/illustration-article.svg"
                 alt="Ілюстрація статті про HTML та CSS">

            <div class="card__body">
                <span class="card__tag">Learning</span>
                <time class="card__published" datetime="2025-12-21">Опубліковано 21 грудня 2025</time>

                <h1 class="card__title">
                    <a href="#">Основи HTML & CSS, які повинен знати кожен</a>
                </h1>

                <p class="card__excerpt">
                    Ці мови є фундаментом кожної веб-сторінки. HTML створює структуру, а CSS відповідає за зовнішній вигляд та адаптивність.
                </p>

                <div class="card__author">
                    <img class="card__avatar"
                         src="assets/images/image-avatar.webp"
                         alt="Greg Hooper — автор статті">
                    <span class="card__author-name">Greg Hooper</span>
                </div>
            </div>
        </article>
    </main>

</body>
</html>
